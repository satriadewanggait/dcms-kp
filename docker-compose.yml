services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dcms
      POSTGRES_PASSWORD: dcms_secret
      POSTGRES_DB: dcms_kp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcms -d dcms_kp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
